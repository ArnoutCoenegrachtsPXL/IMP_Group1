version: '3.7'

services:
  python-api:
    build: ./backend-python
    container_name: "pythonbackend"
    volumes:
      - ./backend-python:/app
    ports:
      - 9876:9876
  
  frontend:
    build: ./frontend
    container_name: "frontend"
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules
    ports:
      - 5173:5173